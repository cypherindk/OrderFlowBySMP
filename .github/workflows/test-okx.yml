name: OKX Erişim Testi

on:
  workflow_dispatch: {}

jobs:
  test-okx:
    runs-on: ubuntu-latest
    steps:
      - name: OKX public REST test (klines)
        run: |
          echo "== Klines (candles) testi =="
          curl -s -o /tmp/resp.json -w "HTTP KODU: %{http_code}\n" \
            "https://www.okx.com/api/v5/market/candles?instId=BTC-USDT-SWAP&bar=1m&limit=5"
          echo "--- Yanıt içeriği ---"
          cat /tmp/resp.json
          echo ""
          echo "== Ticker testi =="
          curl -s -o /tmp/resp2.json -w "HTTP KODU: %{http_code}\n" \
            "https://www.okx.com/api/v5/market/ticker?instId=BTC-USDT-SWAP"
          echo "--- Yanıt içeriği ---"
          cat /tmp/resp2.json
