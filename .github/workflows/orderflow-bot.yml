name: Order Flow Bot

on:
  schedule:
    # Her 6 saatte bir tetiklenir (00:00, 06:00, 12:00, 18:00 UTC).
    # Job kendi içinde 350dk (5s50d) sonra durur, bu yüzden bir sonraki
    # tetiklemeye kadar ~10dk'lık kısa bir kopukluk olur.
    - cron: "0 */6 * * *"
  workflow_dispatch:
    inputs:
      symbols:
        description: 'Boş bırak = en likit 20 otomatik seçilir. Ya da JSON dizi ver: ["PI_XBTUSD","PI_ETHUSD"]'
        required: false
        default: ""
      score_threshold:
        description: "Sinyal skor eşiği (0-1)"
        required: false
        default: "0.4"
      send_test_signal:
        description: "Gerçek veri beklemeden örnek bir sinyal mesajı gönder ve çık"
        type: boolean
        required: false
        default: false

jobs:
  select-symbols:
    runs-on: ubuntu-latest
    outputs:
      symbols: ${{ steps.pick.outputs.symbols }}
    steps:
      - name: En likit 20 perpetual sembolü Kraken'den canlı seç
        id: pick
        run: |
          curl -s "https://futures.kraken.com/derivatives/api/v3/tickers" -o tickers.json
          SYMBOLS=$(jq -c '
            [.tickers[]
              | select(.tag == "perpetual" and .vol24h != null)
              | {symbol: (.symbol | ascii_upcase), vol24h: (.vol24h | tonumber)}]
            | sort_by(-.vol24h)
            | .[0:20]
            | map(.symbol)
          ' tickers.json)
          echo "symbols=$SYMBOLS" >> "$GITHUB_OUTPUT"
          echo "Seçilen semboller (24s hacme göre en likit 20): $SYMBOLS"

  run-bot:
    needs: select-symbols
    runs-on: ubuntu-latest
    timeout-minutes: 350   # GitHub'ın 360dk (6 saat) sert sınırından önce kendi isteğimizle bitir
    strategy:
      fail-fast: false
      matrix:
        symbol: ${{ fromJson(github.event.inputs.symbols || needs.select-symbols.outputs.symbols) }}
    concurrency:
      group: orderflow-bot-${{ matrix.symbol }}
      cancel-in-progress: false
    steps:
      - name: Repo checkout
        uses: actions/checkout@v4

      - name: Python kur
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Bağımlılıkları yükle
        run: pip install -r requirements.txt

      - name: Botu çalıştır (${{ matrix.symbol }})
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          ARGS="--symbol ${{ matrix.symbol }} --score-threshold ${{ github.event.inputs.score_threshold || '0.4' }} --require-confluence"
          if [ "${{ github.event.inputs.send_test_signal }}" = "true" ]; then
            ARGS="$ARGS --send-test-signal"
          fi
          python orderflow_bot.py $ARGS
